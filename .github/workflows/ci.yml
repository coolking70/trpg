name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 测试 + 构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 跑 Jest 测试
        run: npm test

      - name: 构建生产包（仅作质量门：验证可打包，不发布）
        run: npm run build

      # 现阶段不发布到 GitHub Pages：已移除 dist 产物上传与部署步骤。
      # 将来需要发布时，再加回 actions/upload-pages-artifact + actions/deploy-pages。
