name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 测试 + 构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 跑 Jest 测试
        run: npm test

      - name: 构建生产包
        run: npm run build

      - name: 上传 dist 产物（供 Pages 部署）
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
