name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 跑测试
        run: npm test

      - name: 构建（带 GitHub Pages base 路径）
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
